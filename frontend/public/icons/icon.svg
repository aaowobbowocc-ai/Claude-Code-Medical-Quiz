<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#0D9488"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle medical cross watermark -->
  <rect x="206" y="30" width="100" height="280" rx="22" fill="rgba(255,255,255,0.08)"/>
  <rect x="116" y="120" width="280" height="100" rx="22" fill="rgba(255,255,255,0.08)"/>

  <!-- Crown -->
  <g transform="translate(256,105)" filter="url(#shadow)">
    <path d="M-55,28 L-68,-18 L-36,4 L0,-32 L36,4 L68,-18 L55,28 Z" fill="#FFD700" stroke="#FFA000" stroke-width="2.5"/>
    <rect x="-57" y="28" width="114" height="16" rx="4" fill="#FFD700" stroke="#FFA000" stroke-width="2"/>
    <circle cx="-36" cy="4" r="6" fill="#FF5252"/>
    <circle cx="0" cy="-8" r="7" fill="#FF5252"/>
    <circle cx="36" cy="4" r="6" fill="#FF5252"/>
    <circle cx="-68" cy="-18" r="5.5" fill="#FFD700"/>
    <circle cx="0" cy="-32" r="6" fill="#FFD700"/>
    <circle cx="68" cy="-18" r="5.5" fill="#FFD700"/>
  </g>

  <!-- Main text: 國考 -->
  <text x="256" y="260" text-anchor="middle" font-family="'Noto Sans TC','Microsoft JhengHei','PingFang TC',Arial,sans-serif" font-weight="900" font-size="100" fill="rgba(255,255,255,0.85)" filter="url(#shadow)">國考</text>

  <!-- Main text: 知識王 -->
  <text x="256" y="380" text-anchor="middle" font-family="'Noto Sans TC','Microsoft JhengHei','PingFang TC',Arial,sans-serif" font-weight="900" font-size="120" fill="white" filter="url(#shadow)">知識王</text>

  <!-- Bottom accent line -->
  <rect x="186" y="405" width="140" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
</svg>
