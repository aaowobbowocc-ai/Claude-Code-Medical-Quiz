<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#0D9488"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle medical cross watermark -->
  <rect x="206" y="50" width="100" height="280" rx="22" fill="rgba(255,255,255,0.08)"/>
  <rect x="116" y="140" width="280" height="100" rx="22" fill="rgba(255,255,255,0.08)"/>

  <!-- Crown -->
  <g transform="translate(256,130)" filter="url(#shadow)">
    <!-- Crown body -->
    <path d="M-60,30 L-75,-20 L-40,5 L0,-35 L40,5 L75,-20 L60,30 Z" fill="#FFD700" stroke="#FFA000" stroke-width="3"/>
    <!-- Crown base -->
    <rect x="-62" y="30" width="124" height="18" rx="5" fill="#FFD700" stroke="#FFA000" stroke-width="2"/>
    <!-- Gems -->
    <circle cx="-40" cy="5" r="7" fill="#FF5252"/>
    <circle cx="0" cy="-8" r="8" fill="#FF5252"/>
    <circle cx="40" cy="5" r="7" fill="#FF5252"/>
    <!-- Crown tips -->
    <circle cx="-75" cy="-20" r="6" fill="#FFD700"/>
    <circle cx="-40" cy="5" r="4" fill="#FFE082"/>
    <circle cx="0" cy="-35" r="7" fill="#FFD700"/>
    <circle cx="40" cy="5" r="4" fill="#FFE082"/>
    <circle cx="75" cy="-20" r="6" fill="#FFD700"/>
  </g>

  <!-- Main text: 知識王 -->
  <text x="256" y="310" text-anchor="middle" font-family="'Noto Sans TC','Microsoft JhengHei','PingFang TC',Arial,sans-serif" font-weight="900" font-size="120" fill="white" filter="url(#shadow)">知識王</text>

  <!-- Sub text: 國考 -->
  <text x="256" y="400" text-anchor="middle" font-family="'Noto Sans TC','Microsoft JhengHei','PingFang TC',Arial,sans-serif" font-weight="700" font-size="56" fill="rgba(255,255,255,0.7)">國考</text>

  <!-- Bottom accent line -->
  <rect x="186" y="425" width="140" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
</svg>
